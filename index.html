<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --az1:#1A3FBF;--az2:#2255D4;--az3:#4C7FFF;--az4:#7FA8FF;
  --gold:#D4A843;--gold2:#F0C96A;--gold3:#FFF0C0;
  --bg:#020408;--s1:#050810;--s2:#080C18;--s3:#0C1220;--s4:#111828;
  --br:#1C2840;--txt:#E4EEFF;--muted:#3D547A;
  --green:#00C060;--red:#D42222;--it:#009246;--it2:#CE2B37;
  --glass:rgba(255,255,255,.03);--glass-border:rgba(255,255,255,.07);
  --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font-b);font-weight:300;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--az2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* TOPBAR */
#topbar{background:rgba(5,8,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
.ita{display:flex;height:3px;flex-shrink:0}
.ita-g{flex:1;background:var(--it)}
.ita-w{flex:1;background:rgba(255,255,255,.18)}
.ita-r{flex:1;background:var(--it2)}
.nav-inner{display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto}
.nav-brand{font-family:var(--font-d);font-size:18px;letter-spacing:3px;color:var(--gold);padding:9px 16px 9px 0;border-right:1px solid var(--br);margin-right:8px;white-space:nowrap;flex-shrink:0}
.nav-btn{background:transparent;color:var(--muted);border:none;border-radius:6px;padding:8px 12px;font-size:11px;white-space:nowrap;transition:all .18s;font-weight:400;font-family:var(--font-b);cursor:pointer}
.nav-btn:hover{color:var(--txt);background:var(--s3)}
.nav-btn.active{background:linear-gradient(135deg,var(--az1),var(--az2));color:#fff;font-weight:600;box-shadow:0 0 16px rgba(26,63,191,.5)}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:10px;padding:4px 10px;border-radius:12px;white-space:nowrap;flex-shrink:0;margin-left:auto;border:1px solid var(--br)}
.sync-badge.synced{color:var(--green);border-color:rgba(0,176,80,.3)}
.sync-badge.saving{color:var(--gold);border-color:rgba(201,168,76,.3)}
.sync-badge.error{color:var(--red);border-color:rgba(204,34,34,.3)}
.sync-dot{width:6px;height:6px;border-radius:50%}
.synced .sync-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.saving .sync-dot{background:var(--gold);animation:pulse .8s infinite}
.error .sync-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.user-badge{display:none;align-items:center;gap:7px;flex-shrink:0;padding:3px 4px 3px 4px;border-radius:20px;border:1px solid var(--br)}
.user-avatar{width:22px;height:22px;border-radius:50%;border:1px solid rgba(201,168,76,.4);object-fit:cover}

/* LAYOUT */
#main{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.page{display:none}.page.active{display:flex;flex-direction:column;gap:14px}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.loading-logo{font-family:var(--font-d);font-size:72px;letter-spacing:8px;color:var(--gold);text-shadow:0 0 60px rgba(212,168,67,.5),0 0 120px rgba(212,168,67,.2)}
.loading-sub{font-size:12px;color:var(--muted);letter-spacing:4px;text-transform:uppercase}
.loading-bar{width:200px;height:2px;background:var(--s3);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--az2),var(--gold));border-radius:2px;animation:loadfill 1.2s ease-out forwards}
@keyframes loadfill{from{width:0}to{width:100%}}

/* PRIMITIVES */
.panel{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--glass-border);border-radius:16px;padding:20px 18px;backdrop-filter:blur(4px)}
.slabel{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;opacity:.9}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent)}
.az-div{height:1px;background:linear-gradient(90deg,transparent,rgba(26,117,255,.4),rgba(201,168,76,.3),transparent);margin:14px 0}

/* KPI */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.kpi-card{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--glass-border);border-radius:14px;padding:14px 13px;position:relative;overflow:hidden;transition:border-color .2s}
.kpi-card:hover{border-color:rgba(212,168,67,.4)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(26,117,255,.8),rgba(201,168,76,.4),transparent)}
.kpi-val{font-family:var(--font-d);font-size:28px;color:var(--gold);line-height:1;text-shadow:0 0 20px rgba(212,168,67,.4)}
.kpi-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px}

/* BUTTONS */
.btn{background:transparent;color:var(--muted);border:1px solid var(--br);border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:var(--font-b)}
.btn:hover{color:var(--txt);background:var(--s3)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:var(--gold);font-weight:700;box-shadow:0 0 12px rgba(212,168,67,.25)}
.btn-gold:hover{background:var(--gold2)}
.btn-az{background:var(--az1);color:#fff;border-color:var(--az2);font-weight:600}
.btn-az:hover{background:var(--az2)}
.btn-danger{border-color:#5A1818;color:#FF8080}
.btn-danger:hover{background:#220404}
.btn-sm{padding:4px 10px;font-size:11px}

/* CHIPS */
.chip{background:transparent;color:var(--muted);border:1px solid var(--br);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;transition:all .18s;font-family:var(--font-b)}
.chip.act-az{background:var(--az1);color:#fff;border-color:var(--az2)}
.chip.act-gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}

/* FORMS */
.inp-wrap{display:flex;flex-direction:column;gap:4px}
.inp-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.inp-f{background:var(--s1);border:1px solid var(--br);border-radius:6px;color:var(--txt);font-size:12px;padding:7px 9px;outline:none;width:100%;font-family:var(--font-b);transition:border-color .15s}
.inp-f:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(212,168,67,.1)}
select.inp-f{cursor:pointer}
textarea.inp-f{resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.g6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px}
.span2{grid-column:span 2}
.f-actions{display:flex;gap:8px;margin-top:12px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(1,2,8,.97);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-bg.open{display:flex}
.modal-box{background:linear-gradient(160deg,#080E1E,#040810);border:1px solid rgba(76,127,255,.25);border-radius:18px;padding:26px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 0 80px rgba(26,80,200,.25),0 0 0 1px rgba(255,255,255,.04)}
.modal-close{position:absolute;top:12px;right:12px;background:var(--s4);border:1px solid var(--br);color:var(--muted);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:13px;line-height:26px;text-align:center;font-family:var(--font-b)}

/* FLASH */
.flash{position:fixed;top:66px;right:16px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none}
.flash.show{opacity:1}
.flash.ok{background:var(--green);color:#000}
.flash.err{background:var(--red);color:#fff}

/* ROW ITEM */
.row-item{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--glass-border);border-radius:11px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:5px;transition:border-color .18s}
.row-item:hover{border-color:rgba(76,127,255,.3)}
.row-item.gold{border-color:rgba(201,168,76,.35)}

/* PROFILE HERO */
.profile-hero{background:linear-gradient(135deg,#06091A,#050815,#040810);border:1px solid rgba(76,127,255,.18);border-radius:18px;overflow:hidden;box-shadow:0 0 40px rgba(10,20,60,.6)}
.profile-body{padding:22px 26px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.p-avatar{width:74px;height:74px;border-radius:50%;background:radial-gradient(circle,rgba(0,61,165,.44),transparent 70%);border:2px solid rgba(201,168,76,.55);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;font-family:var(--font-d);color:var(--gold);flex-shrink:0;box-shadow:0 0 28px rgba(0,61,165,.5);overflow:hidden;cursor:pointer;position:relative}
.p-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:18px}
.p-avatar:hover .p-avatar-overlay{opacity:1}
/* Ballon photo hover */
div:hover > .bd-photo-overlay{opacity:1!important}
.p-name{font-family:var(--font-d);font-size:32px;letter-spacing:3px;line-height:1;color:var(--txt)}
.p-pos{font-size:10px;letter-spacing:3px;color:var(--az4);margin-bottom:4px;text-transform:uppercase}
.p-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px}
.p-bio{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.7;border-left:3px solid rgba(26,117,255,.5);padding-left:10px}

/* PROGRESS */
.prog-wrap{margin-bottom:11px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:11px;color:var(--muted)}
.prog-val{font-family:var(--font-d);font-size:17px}
.prog-bar{height:3px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}

/* TIMELINE BALLON */
.bt-line{display:flex;position:relative;overflow-x:auto;padding-bottom:8px}
.bt-line::before{content:'';position:absolute;top:38px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.2),transparent)}
.bt-item{flex:0 0 auto;min-width:68px;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1}
.bt-year{font-size:8px;color:var(--muted)}
.bt-dot{border-radius:50%;border:2px solid var(--br);transition:all .3s;display:flex;align-items:center;justify-content:center}
.bt-dot.won{width:30px;height:30px;background:linear-gradient(135deg,var(--gold2),var(--gold));border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.6);font-size:13px}
.bt-dot.empty{width:9px;height:9px;background:var(--s3);font-size:0}
.bt-club{font-size:9px;color:var(--muted)}
.bt-club.won{color:var(--gold)}

/* CLUBS */
.club-card{background:var(--s2);border:1px solid var(--br);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .22s;margin-bottom:12px}
.club-card:hover,.club-card.exp{border-color:rgba(201,168,76,.4)}
.club-top-bar{height:3px}
.club-head{padding:18px 16px;display:flex;align-items:center;gap:13px}
.c-icon{font-size:34px;flex-shrink:0}
.c-fullname{font-family:var(--font-d);font-size:19px;letter-spacing:2px;line-height:1}
.c-sub{font-size:10px;color:var(--muted);margin-top:3px}
.c-tbadge{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-radius:20px;padding:3px 11px;font-family:var(--font-d);font-size:15px;margin-left:auto;white-space:nowrap;flex-shrink:0}
.c-chevron{color:var(--muted);font-size:12px;margin-left:8px;transition:transform .2s;flex-shrink:0}
.club-card.exp .c-chevron{transform:rotate(180deg)}
.c-hl{display:grid;grid-template-columns:repeat(6,1fr);background:var(--s1);border-top:1px solid var(--br);border-bottom:1px solid var(--br)}
.hl-cell{padding:9px 5px;text-align:center}
.hl-cell:not(:last-child){border-right:1px solid var(--br)}
.hl-v{font-family:var(--font-d);font-size:18px;color:var(--gold);line-height:1}
.hl-l{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.club-body{padding:14px 16px}
.c-desc{font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:9px}
.t-pills{display:flex;flex-wrap:wrap;gap:5px}
.t-pill{font-size:10px;padding:2px 7px;border-radius:4px;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.28)}
.club-ext{display:none;padding:0 16px 18px;border-top:1px solid var(--br)}
.club-card.exp .club-ext{display:block}
.ex-sec{font-family:var(--font-d);font-size:12px;letter-spacing:3px;color:var(--az4);margin:12px 0 8px}
.legacy-q{font-size:12px;color:var(--txt);line-height:1.8;border-left:3px solid rgba(201,168,76,.5);padding-left:10px;font-style:italic;margin-bottom:4px}
.s-row{display:flex;align-items:center;gap:8px;background:var(--s3);border-radius:5px;padding:6px 10px;font-size:11px;margin-bottom:3px}
.sr-yr{font-family:var(--font-d);font-size:13px;color:var(--muted);min-width:50px}
.sr-lg{flex:1;color:var(--muted);font-size:10px}
.sr-g{color:var(--gold);font-family:var(--font-d);font-size:14px}
.sr-a{color:var(--az4);font-family:var(--font-d);font-size:14px}
.sr-ga{font-family:var(--font-d);font-size:14px}
.sr-rt{font-size:10px;color:var(--muted)}
.sr-rt.hi{color:var(--green)}

/* TRANSFERS */
.tr-tl{position:relative}
.tr-tl::before{content:'';position:absolute;left:23px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,rgba(26,117,255,.5),rgba(201,168,76,.4),var(--br))}
.tr-item{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.tr-dot{width:46px;height:46px;border-radius:50%;background:var(--s1);border:2px solid;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;z-index:1}
.tr-card{flex:1;background:var(--s3);border-radius:9px;padding:11px 14px;border-left:3px solid}
.tr-clubs{display:flex;align-items:center;gap:7px;margin-bottom:2px;font-size:12px}
.tr-to{font-weight:600;color:var(--txt)}
.tr-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase}
.tr-desc{font-size:10px;color:var(--muted);margin-top:2px}
.tr-r{text-align:right}
.tr-fee{font-family:var(--font-d);font-size:20px}
.tr-meta{font-size:10px;color:var(--muted)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{border-bottom:1px solid rgba(201,168,76,.18)}
th{padding:7px 10px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);text-align:left;white-space:nowrap;font-weight:400;opacity:.8}
tbody tr:nth-child(even){background:rgba(255,255,255,.018)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05)}
tbody tr{transition:background .15s}tbody tr:hover{background:rgba(76,127,255,.07)}
td{padding:9px 10px;vertical-align:middle}
.tn{font-family:var(--font-d);font-size:15px}
.tyr{font-family:var(--font-d);font-size:13px;color:var(--muted)}
.tga{color:var(--gold)}
.tavg{color:var(--az4)}
.thi{color:var(--green)}
.brow{border-bottom-color:rgba(201,168,76,.2)!important}
.crow{background:linear-gradient(90deg,rgba(0,192,96,.07),transparent)!important;border-left:3px solid var(--green)!important}
tbody tr[onclick]{cursor:pointer}
.crow td:first-child{padding-left:7px}
.s-live{display:inline-flex;align-items:center;gap:4px;background:rgba(0,192,96,.12);color:var(--green);border:1px solid rgba(0,192,96,.3);border-radius:4px;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:2px 6px;font-weight:700;vertical-align:middle;margin-left:6px}
.s-live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse .9s infinite}
.s-badge{display:inline-flex;align-items:center;gap:2px;border-radius:4px;font-size:9px;padding:1px 5px;font-weight:700;vertical-align:middle;margin-left:3px}
.s-badge-ucl{background:rgba(212,168,67,.15);color:var(--gold);border:1px solid rgba(212,168,67,.3)}
.s-badge-nat{background:rgba(0,146,70,.15);color:#4EC88A;border:1px solid rgba(0,146,70,.3)}
.s-season-modal .s-trophy-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.s-season-modal .s-trophy-item:last-child{border-bottom:none}

/* TROPHY */
.tr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px}
.t-card{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--glass-border);border-radius:14px;padding:16px 14px;position:relative;overflow:hidden;cursor:pointer;transition:all .22s}
.t-card:hover{background:linear-gradient(135deg,var(--s3),var(--s2));border-color:rgba(212,168,67,.45);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.t-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--az1),rgba(201,168,76,.6),transparent);opacity:.4;transition:opacity .2s}
.t-card:hover::before{opacity:1}
.t-badge{position:absolute;top:11px;right:11px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-radius:11px;padding:2px 7px;font-family:var(--font-d);font-size:14px}
.t-icon{font-size:26px;margin-bottom:7px}
.t-name{font-size:11px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:2px}
.t-yrs{font-size:9px;color:var(--muted)}

/* NATIONAL */
.nt-cards{display:flex;gap:11px;flex-wrap:wrap}
.nt-card{border-radius:13px;padding:20px 18px;position:relative;overflow:hidden}
.nt-gold{flex:2 1 280px;background:var(--s2);border:1px solid rgba(201,168,76,.22)}
.nt-sil{flex:1 1 200px;background:var(--s2);border:1px solid rgba(160,168,192,.15)}
.nt-bro{flex:1 1 200px;background:var(--s2);border:1px solid rgba(144,96,64,.15)}
.nt-bar{position:absolute;top:0;left:0;right:0;height:2px}
.nt-rb{position:absolute;top:12px;right:12px;border-radius:12px;padding:2px 8px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.nt-ic{font-size:36px;margin-bottom:9px}
.nt-nm{font-family:var(--font-d);font-size:17px;letter-spacing:1px;margin-bottom:3px}
.nt-fin{font-size:11px;font-style:italic;margin-bottom:6px}
.nt-st{display:inline-block;background:var(--s1);border:1px solid rgba(201,168,76,.25);border-radius:5px;padding:3px 9px;font-size:10px;color:var(--gold);margin-bottom:7px;font-family:var(--font-d)}
.nt-ds{font-size:10px;color:var(--muted);line-height:1.7}

/* DEL CONFIRM */
.del-cf{display:flex;align-items:center;gap:7px;margin-top:7px;font-size:11px;color:var(--red)}

/* MARCOS RESTANTES */
.ms-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--br);font-size:12px}
.ms-item:last-child{border-bottom:none}
.ms-lbl{color:var(--txt)}
.ms-val{font-family:var(--font-d);font-size:20px;color:var(--az4);min-width:36px;text-align:right}
.ms-val.done{color:var(--green);font-size:16px}

/* RESPONSIVE */

/* GLOBAL SEARCH */
#gsearch-wrap{position:fixed;inset:0;background:rgba(1,2,8,.97);backdrop-filter:blur(12px);z-index:500;display:none;align-items:flex-start;justify-content:center;padding-top:80px}

#gsearch-box{background:#080E1E;border:1px solid rgba(76,127,255,.4);border-radius:16px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 0 80px rgba(26,80,200,.3)}

#gsearch-inp::placeholder{color:var(--muted)}
#gsearch-divider{height:1px;background:rgba(76,127,255,.2)}
#gsearch-results{max-height:400px;overflow-y:auto;padding:8px}
.gs-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;cursor:pointer;transition:background .15s}
.gs-item:hover{background:rgba(26,63,191,.15)}
.gs-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.gs-label{font-size:13px;font-weight:500}
.gs-sub{font-size:10px;color:var(--muted);margin-top:1px}
.gs-badge{margin-left:auto;font-family:var(--font-d);font-size:14px;color:var(--gold)}
.gs-empty{padding:24px;text-align:center;color:var(--muted);font-size:12px}
.gs-section{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:8px 12px 4px}

/* KPI COUNT ANIMATION */
@keyframes kpiUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi-val{animation:kpiUp .5s ease both}

/* SORT INDICATOR */
th.sort-asc::after{content:" ▲";color:var(--gold);font-size:9px}
th.sort-desc::after{content:" ▼";color:var(--gold);font-size:9px}
th[data-sort]{cursor:pointer;user-select:none}
th[data-sort]:hover{color:var(--gold2)}

/* RECORD BADGE */
.rec-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);color:var(--gold);border-radius:4px;font-size:8px;padding:1px 5px;margin-left:4px;vertical-align:middle}

.cmp-x{cursor:pointer;color:var(--muted);font-size:13px;line-height:1}
.cmp-x:hover{color:var(--red)}

#theme-toggle{background:transparent;border:1px solid var(--br);border-radius:8px;color:var(--muted);padding:5px 9px;font-size:15px;cursor:pointer;flex-shrink:0;transition:all .2s;line-height:1}

.tl-outer{overflow-x:auto;overflow-y:visible;padding:0 0 20px}
.tl-wrap{position:relative;min-width:900px;padding:120px 40px 60px}
.tl-track{position:absolute;left:40px;right:40px;top:50%;height:4px;background:linear-gradient(90deg,transparent,rgba(26,117,255,.25) 5%,rgba(201,168,67,.3) 50%,rgba(26,117,255,.25) 95%,transparent);border-radius:4px;transform:translateY(-50%);z-index:1}
.tl-year-axis{position:absolute;left:40px;right:40px;top:50%;display:flex;justify-content:space-between;pointer-events:none;z-index:0}

.tl-clubs-row{position:absolute;left:40px;right:40px;top:50%;height:4px}
.tl-club-block{position:absolute;height:36px;border-radius:6px;top:50%;transform:translateY(-50%);cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;gap:5px;overflow:hidden;z-index:2}

.tl-tr-dot{width:18px;height:18px;border-radius:50%;background:var(--s1);border:2px solid;display:flex;align-items:center;justify-content:center;font-size:9px;margin-left:-9px;transition:transform .2s}
.tl-transfer:hover .tl-tr-dot{transform:scale(1.4)}
/* Trophies */
.tl-trophies-row{position:absolute;left:40px;right:40px;top:50%;pointer-events:none}

@keyframes tl-star-pulse{0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,67,.9))}50%{filter:drop-shadow(0 0 18px rgba(201,168,67,1)) drop-shadow(0 0 4px #fff)}}

.tl-nat-line{width:1px;background:rgba(0,146,70,.35)}

.tl-legend{display:flex;flex-wrap:wrap;gap:14px;padding:6px 0}

</style>

async function loadFromCloud(){
  if(!currentUser)return false;
  try{
    const ref=doc(db,"users",currentUser.uid,STORAGE_KEY,"data");
    const snap=await getDoc(ref);
    if(snap.exists()){
      const data=snap.data().payload;
      for(const k of Object.keys(DEF)){
        if(data[k]!==undefined) S[k]=data[k];
      }
      lastSaved=JSON.stringify(getSerializable());
    }
    return true;
  }catch(e){
    console.error("Load error:",e);
    return false;
  }
}

async function saveToCloud(){
  if(!currentUser){setSyncStatus("error","Sem login");return;}
  try{
    setSyncStatus("saving","Salvando...");
    const data=getSerializable();
    const str=JSON.stringify(data);
    if(str===lastSaved){setSyncStatus("synced","Sincronizado ✓");return;}
    const ref=doc(db,"users",currentUser.uid,STORAGE_KEY,"data");
    await setDoc(ref,{payload:data,updatedAt:new Date().toISOString()});
    lastSaved=str;
    setSyncStatus("synced","Sincronizado ✓");
  }catch(e){
    setSyncStatus("error","Erro ao salvar");
    console.error("Save error:",e);
  }
}

function scheduleSave(){
  setSyncStatus("saving","Pendente...");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveToCloud,800);
}

/* ══ BACKUP: EXPORT / IMPORT ══ */
function exportData(){
  const data=getSerializable();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const stamp=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`conforto-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  flash("✓ Backup exportado!");
}
async function importDataFromInput(inputEl){
  const file=inputEl.files&&inputEl.files[0];
  if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    for(const k of Object.keys(DEF)){
      if(data[k]!==undefined)S[k]=data[k];
    }
    S.expandedClub=null;
    scheduleSave();
    document.getElementById("nav-brand").textContent=(S.profile.name||"CONFORTO").toUpperCase();
    flash("✓ Backup importado!");
    renderEdit();
  }catch(err){
    console.error("Import error:",err);
    flash("✗ Arquivo inválido","err");
  }finally{
    inputEl.value="";
  }
}

function animateKpis(){
  document.querySelectorAll(".kpi-val[data-target]").forEach(el=>{
    const target=parseFloat(el.dataset.target.replace(/\D/g,""))||0;
    const suffix=el.dataset.target.replace(/[\d.,]/g,"");
    let start=null;
    const dur=900;
    const step=ts=>{
      if(!start)start=ts;
      const p=Math.min((ts-start)/dur,1);
      const ease=1-Math.pow(1-p,3);
      el.textContent=Math.floor(ease*target).toLocaleString("pt-BR")+suffix;
      if(p<1)requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  });
}

  const progs=[{l:"Vitórias",v:T.V,c:"var(--green)",pct:T.J?T.V/T.J*100:0},{l:"Empates",v:T.E,c:"var(--az3)",pct:T.J?T.E/T.J*100:0},{l:"Derrotas",v:T.D,c:"var(--red)",pct:T.J?T.D/T.J*100:0}].map(b=>`<div class="prog-wrap"><div class="prog-row"><span class="prog-lbl">${b.l}</span><span class="prog-val" style="color:${b.c}">${b.v} <span style="font-size:9px;color:var(--muted)">(${b.pct.toFixed(1)}%)</span></span></div><div class="prog-bar"><div class="prog-fill" style="width:${b.pct}%;background:${b.c};box-shadow:0 0 7px ${b.c}55"></div></div></div>`).join("");

  // Mini trend line on overview (G/A por jogo)
  const trendW=Math.max(S.seasons.length*40,300);const trendH=60;
  const gaps=S.seasons.map(s=>n(s.J)>0?(n(s.G)+n(s.A))/n(s.J):0);
  const mxGap=Math.max(...gaps,0.1);
  const tPx=i=>S.seasons.length>1?20+i*((trendW-40)/(S.seasons.length-1)):trendW/2;
  const tPy=v=>trendH-8-((v/mxGap)*(trendH-16));
  const tPts=gaps.map((v,i)=>[tPx(i),tPy(v)]);
  const tPath="M"+tPts.map(p=>p.join(",")).join(" L");
  const tArea=tPath+` L${tPx(gaps.length-1)},${trendH} L${tPx(0)},${trendH} Z`;
  const tDots=gaps.map((v,i)=>`<circle cx="${tPx(i)}" cy="${tPy(v)}" r="${S.seasons[i].ballon?5:2.5}" fill="${S.seasons[i].ballon?"var(--gold)":"var(--az3)"}"><title>${S.seasons[i].year}: ${v.toFixed(2)}</title></circle>`).join("");
  const tLbls=S.seasons.filter((_,i)=>S.seasons.length<=8||i%2===0).map((s,_,arr)=>{const i=S.seasons.indexOf(s);return`<text x="${tPx(i)}" y="${trendH+13}" fill="var(--muted)" font-size="7" text-anchor="middle" font-family="var(--font-d)">${(s.year||"").slice(-5)}</text>`}).join("");

  const retiredBadge=p.retired?`<div style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(212,168,67,.05));border:1px solid rgba(212,168,67,.4);border-radius:8px;padding:4px 12px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-top:7px;font-weight:700;width:fit-content"><span style="font-size:14px">🏅</span> Aposentado</div>`:"";
  document.getElementById("page-overview").innerHTML=`
    <div class="profile-hero">${ita()}<div class="profile-body"><div class="p-avatar" onclick="triggerAvatarUpload()" title="Clique para trocar a foto"><input type="file" id="avatar-file-inp" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)">${p.photo?`<img src="${p.photo}" alt="${p.name}">`:`<span>${p.avatar||"10"}</span>`}<div class="p-avatar-overlay">📷</div></div><div style="flex:1"><div class="p-pos">${p.nationality} · ${p.position} · OVR ${p.overall}</div><div class="p-name">${p.name}</div>${retiredBadge}<div class="p-meta">${meta}</div>${p.bio?`<div class="p-bio">${p.bio}</div>`:""}</div></div></div>
    ${currentSeasonPanel()}
    <div class="kpi-strip">${kpis.map((k,i)=>`<div class="kpi-card"><div class="kpi-val" data-target="${k.v}" style="animation-delay:${i*60}ms">${k.v}</div><div class="kpi-lbl">${k.l}</div></div>`).join("")}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      ${panel(`${slabel("Resultados — "+fmt(T.J)+" jogos")}${progs}<div style="background:var(--s1);border-radius:7px;padding:10px 13px;display:flex;justify-content:space-between;border:1px solid rgba(26,117,255,.18);margin-top:4px"><span style="font-size:10px;color:var(--muted)">Taxa de vitória</span><span style="font-family:var(--font-d);font-size:20px;color:var(--gold)">${T.J?(T.V/T.J*100).toFixed(1):0}%</span></div>`)}
      ${panel(`${slabel("Top Temporadas por G/A")}${top}`)}
    </div>
    <div class="panel" style="background:linear-gradient(135deg,var(--s1),#070E06);border:1px solid rgba(201,168,76,.2)">${slabel("🟡 Ballon d'Or — "+T.BD+" conquistas")}<div class="bt-line">${bt}</div></div>
    ${marcosPanel()}
    ${panel(`${slabel("G/A por Jogo — Evolução da Carreira")}<div style="overflow-x:auto"><svg width="${trendW}" height="${trendH+18}" style="display:block;min-width:${Math.min(trendW,400)}px"><defs><linearGradient id="tg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--az2)" stop-opacity=".5"/><stop offset="100%" stop-color="var(--az2)" stop-opacity="0"/></linearGradient></defs><path d="${tArea}" fill="url(#tg1)"/><path d="${tPath}" stroke="var(--az3)" stroke-width="2" fill="none" stroke-linejoin="round"/>${tDots}${tLbls}</svg></div>`)}
    ${panel(`${slabel("Gols & Assists por Temporada")}<div style="overflow-x:auto"><svg width="${Math.max(cW,400)}" height="${cH+18}" style="display:block">${bars}</svg></div>`)}`;
  setTimeout(animateKpis,100);
}

// Calcula stats de um clube a partir das temporadas vinculadas a ele
function clubStats(c){
  // Vincula por clubId (novo) OU por nome (retrocompatibilidade)
  const cs=S.seasons.filter(s=>(s.clubId!==undefined?String(s.clubId)===String(c.id):s.club===c.name));
  const J=cs.reduce((a,s)=>a+n(s.J),0);
  const G=cs.reduce((a,s)=>a+n(s.G),0);
  const A=cs.reduce((a,s)=>a+n(s.A),0);
  const BD=cs.filter(s=>s.ballon).length;
  const ages=cs.map(s=>n(s.age)).filter(Boolean);
  const ageStr=ages.length?`${Math.min(...ages)}→${Math.max(...ages)}`:"—";
  return{cs,J,G,A,GA:G+A,BD,ageStr};
}

// Conta automaticamente quantos títulos foram conquistados durante as temporadas de um clube,
// somando as wins registradas em cada temporada.
function clubTitleCount(cs){
  return cs.reduce((acc,s)=>{
    return acc + (s.wins||[]).reduce((a,w)=>a+n(w.qty),0);
  },0);
}

function renderClubPassagemCard(c,csAll){
  if(!csAll.length) return "";

  const makeHL=(cs)=>{
    const J=cs.reduce((a,s)=>a+n(s.J),0);
    const G=cs.reduce((a,s)=>a+n(s.G),0);
    const A=cs.reduce((a,s)=>a+n(s.A),0);
    const BD=cs.filter(s=>s.ballon).length;
    const tc=clubTitleCount(cs);
    const ages=cs.map(s=>n(s.age)).filter(Boolean);
    const ageStr=ages.length?`${Math.min(...ages)}→${Math.max(...ages)}`:"—";
    return{J,G,A,GA:G+A,BD,tc,ageStr};
  };

  const p1label=c.passagem||"1ª Passagem";
  const h1=makeHL(csAll);
  const srows1=csAll.map(s=>`<div class="s-row"><span class="sr-yr">${s.year}</span><span class="sr-lg">${s.liga}</span><span class="sr-g">${n(s.G)}G</span><span class="sr-a">${n(s.A)}A</span><span class="sr-ga">${n(s.G)+n(s.A)}</span><span class="sr-rt ${n(s.rating)>=8?"hi":""}">★${s.rating}</span>${s.ballon?"<span style='font-size:11px'>🟡</span>":""}</div>`).join("");

  const allSibCs=sibling.flatMap(sib=>clubStats(sib).cs);

  const totCols=[["Jogos",hTot.J],["Gols",hTot.G],["Assists",hTot.A],["G/A",hTot.GA],["Títulos",hTot.tc+(hTot.BD?` 🟡${hTot.BD}`:"")],["Idades",hTot.ageStr]];

    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px">

      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px">

        <div style="display:flex;gap:18px">${[{v:S.clubs.length,l:"Clubes"},{v:T.Tit,l:"Títulos"},{v:S.seasons.length,l:"Temp."}].map(x=>`<div style="text-align:center"><div style="font-family:var(--font-d);font-size:28px;color:var(--gold)">${x.v}</div><div style="font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase">${x.l}</div></div>`).join("")}</div>

    <div style="display:flex;justify-content:flex-end"><button class="btn btn-az" onclick="newClubModal()">+ Adicionar clube</button></div>

    ${panel(`${slabel("💸 Histórico de Transferências")}<div class="tr-tl">${trs}</div>`,"background:linear-gradient(135deg,var(--s1),#060A1A)")}`;

function getTrophiesForYear(year){
  // Match trophies that contain this year in their years string
  // year format e.g. "2031/32" — we check if any trophy years field contains it
  const y=year||"";
  return S.trophies.filter(t=>{
    const yrs=t.years||"";
    // Match full year or last 5 chars (e.g. "31/32")
    return yrs.includes(y)||yrs.includes(y.slice(-5));
  });
}
function getNationalForYear(year){
  // Check if any national event roughly matches this year
  // e.g. "Eurocopa 2032" -> year "2031/32" or "2032/33"
  const y=year||"";
  const yr1=y.slice(0,4); // e.g. "2031"
  const yr2=y.slice(-2);  // e.g. "32"
  return S.national.filter(ev=>{
    const nm=(ev.name||"")+(ev.final||"");
    return nm.includes(yr1)||nm.includes("20"+yr2);
  });
}

function sortSeasons(col){
  if(seasonSort.col===col) seasonSort.dir*=-1;
  else {seasonSort.col=col;seasonSort.dir=-1;}
  document.querySelectorAll("th[data-sort]").forEach(th=>{
    th.classList.remove("sort-asc","sort-desc");
    if(th.dataset.sort===col) th.classList.add(seasonSort.dir===1?"sort-asc":"sort-desc");
  });
  renderSeasonsRows();
}
function renderSeasonsRows(){
  const f=(S.seasonFilter||"").trim().toLowerCase();
  let list=f?S.seasons.filter(s=>`${s.year} ${s.club} ${s.liga}`.toLowerCase().includes(f)):[...S.seasons];
  if(seasonSort.col){
    list.sort((a,b)=>{
      let av,bv;
      if(seasonSort.col==="GA"){av=n(a.G)+n(a.A);bv=n(b.G)+n(b.A);}
      else if(seasonSort.col==="avg"){av=n(a.J)>0?(n(a.G)+n(a.A))/n(a.J):0;bv=n(b.J)>0?(n(b.G)+n(b.A))/n(b.J):0;}
      else if(seasonSort.col==="ballon"){av=a.ballon?1:0;bv=b.ballon?1:0;}
      else if(["J","V","E","D","G","A","rating"].includes(seasonSort.col)){av=n(a[seasonSort.col]);bv=n(b[seasonSort.col]);}
      else{av=(a[seasonSort.col]||"").toLowerCase();bv=(b[seasonSort.col]||"").toLowerCase();}
      return av>bv?seasonSort.dir:av<bv?-seasonSort.dir:0;
    });
  }
  const recG=Math.max(...S.seasons.map(s=>n(s.G)));
  const recA=Math.max(...S.seasons.map(s=>n(s.A)));
  const recGA=Math.max(...S.seasons.map(s=>n(s.G)+n(s.A)));
  const recRat=Math.max(...S.seasons.map(s=>n(s.rating)));
  const recJ=Math.max(...S.seasons.map(s=>n(s.J)));
  const rows=list.map((s)=>{
    const ga=n(s.G)+n(s.A);
    const avg=n(s.J)>0?(ga/n(s.J)).toFixed(2):"—";
    const isCurrent=!!s.current;
    const rowCls=isCurrent?"crow":s.ballon?"brow":"";
    const liveBadge=isCurrent?`<span class="s-live"><span class="s-live-dot"></span>EM ANDAMENTO</span>`:"";
    const seasonWins=(s.wins||[]);
    const uclWon=seasonWins.some(w=>{const t=S.trophies.find(x=>String(x.id)===String(w.trophyId));return t&&/(champions|ucl)/i.test(t.name);});
    const europaWon=!uclWon&&seasonWins.some(w=>{const t=S.trophies.find(x=>String(x.id)===String(w.trophyId));return t&&/(europa)/i.test(t.name);});
    const natEvs=getNationalForYear(s.year);
    const natWon=natEvs.some(ev=>/(campe)/i.test(ev.result||""));
    const uclBadge=uclWon?`<span class="s-badge s-badge-ucl">⭐ UCL</span>`:(europaWon?`<span class="s-badge s-badge-ucl">🏆 UEL</span>`:"");
    const natBadge=natWon?`<span class="s-badge s-badge-nat">🇮🇹 SEL</span>`:"";
    const crown=`<span class="rec-badge">👑</span>`;
    const gRec=n(s.G)===recG&&recG>0?crown:"";
    const aRec=n(s.A)===recA&&recA>0?crown:"";
    const gaRec=ga===recGA&&recGA>0?crown:"";
    const ratRec=n(s.rating)===recRat&&recRat>0?crown:"";
    const jRec=n(s.J)===recJ&&recJ>0?crown:"";
    const inCmp=compareList.includes(s.id);
    return`<tr class="${rowCls}" onclick="openSeasonModal(${s.id})" title="Clique para ver detalhes"><td class="tyr">${s.year}${liveBadge}</td><td>${s.club} ${s.country}${uclBadge}${natBadge}</td><td style="color:var(--muted);font-size:10px">${s.liga}</td><td class="tn">${s.J}${jRec}</td><td class="tn">${s.V}</td><td class="tn">${s.E}</td><td class="tn">${s.D}</td><td class="tn tga">${s.G}${gRec}</td><td class="tn" style="color:var(--az4)">${s.A}${aRec}</td><td class="tn tga">${ga}${gaRec}</td><td class="tn tavg">${avg}</td><td class="tn ${n(s.rating)>=8?"thi":""}">${s.rating}${ratRec}</td><td>${s.ballon?"🟡":""}</td><td><button class="btn btn-sm ${inCmp?"btn-az":""}" onclick="event.stopPropagation();toggleCompare(${s.id})" title="Selecionar para comparar">⚖️</button></td><td><button class="btn btn-sm" onclick="event.stopPropagation();editSM(${s.id})">✏️</button></td></tr>`;
  }).join("");
  document.getElementById("seasons-tbody").innerHTML=rows||`<tr><td colspan="15" style="text-align:center;color:var(--muted);padding:24px;font-size:12px">Nenhuma temporada encontrada</td></tr>`;
}

function getSeasonWins(seasonId){
  const s = S.seasons.find(x => String(x.id) === String(seasonId));
  return s ? (s.wins || []) : [];
}

function addSeasonWin(seasonId){
  const tid = gv("sw-tid");
  if(!tid){flash("Selecione um troféu","err");return;}
  const qty = Math.max(1, gvn("sw-qty") || 1);
  const s = S.seasons.find(x => String(x.id) === String(seasonId));
  if(!s) return;
  if(!s.wins) s.wins = [];
  // Se já tem esse troféu nesta temporada, soma
  const existing = s.wins.find(w => String(w.trophyId) === String(tid));
  if(existing){ existing.qty += qty; }
  else { s.wins.push({trophyId: tid, qty}); }
  // Atualiza count total do troféu
  recalcTrophyCount(tid);
  scheduleSave();
  document.getElementById("season-trophy-sec").outerHTML = seasonTrophySection(seasonId, s.wins);
  flash("✓ Conquista adicionada!");
}

function removeSeasonWin(seasonId, idx){
  const s = S.seasons.find(x => String(x.id) === String(seasonId));
  if(!s || !s.wins) return;
  const tid = s.wins[idx] && s.wins[idx].trophyId;
  s.wins.splice(idx, 1);
  if(tid) recalcTrophyCount(tid);
  scheduleSave();
  document.getElementById("season-trophy-sec").outerHTML = seasonTrophySection(seasonId, s.wins);
  flash("🗑 Removido!");
}

function createAndAddSeasonWin(seasonId){
  const name = gv("stf-n");
  if(!name){flash("Nome obrigatório","err");return;}
  const t = {id:uid(), name, icon:gv("stf-ic")||"🏆", count:0, years:"", category:gv("stf-ca"), desc:""};
  S.trophies.push(t);
  const s = S.seasons.find(x => String(x.id) === String(seasonId));
  if(!s) return;
  if(!s.wins) s.wins = [];
  s.wins.push({trophyId: String(t.id), qty: 1});
  recalcTrophyCount(t.id);
  scheduleSave();
  document.getElementById("season-trophy-sec").outerHTML = seasonTrophySection(seasonId, s.wins);
  flash("✓ Troféu criado e adicionado!");
}

// Recalcula o count total de um troféu somando todas as wins de todas as temporadas
function recalcTrophyCount(trophyId){
  const t = S.trophies.find(x => String(x.id) === String(trophyId));
  if(!t) return;
  const total = S.seasons.reduce((acc, s) => {
    const w = (s.wins||[]).find(w => String(w.trophyId) === String(trophyId));
    return acc + (w ? n(w.qty) : 0);
  }, 0);
  t.count = total;
}

/* ══ COMPARE ══ */
function toggleCompare(id){
  const idx=compareList.indexOf(id);
  if(idx>-1) compareList.splice(idx,1);
  else if(compareList.length<4) compareList.push(id);
  else{flash("Máx. 4 temporadas para comparar","err");return;}
  updateCompareBar();
  renderSeasonsRows();
}
function updateCompareBar(){
  const bar=document.getElementById("compare-bar");
  const tags=document.getElementById("compare-tags");
  if(!compareList.length){bar.classList.remove("show");return;}
  bar.classList.add("show");
  tags.innerHTML=compareList.map(id=>{
    const s=S.seasons.find(x=>x.id===id);
    return s?`<div class="cmp-tag">${s.year} · ${s.club} <span class="cmp-x" onclick="toggleCompare(${id})">✕</span></div>`:"";
  }).join("");
}
function clearCompare(){compareList=[];updateCompareBar();if(document.getElementById("seasons-tbody"))renderSeasonsRows();}
function openCompare(){
  if(compareList.length<2){flash("Selecione ao menos 2 temporadas","err");return;}
  const seasons=compareList.map(id=>S.seasons.find(x=>x.id===id)).filter(Boolean);
  const fields=[["Jogos","J"],["Gols","G"],["Assists","A"],["G/A","GA"],["Média G/A","avg"],["Vitórias","V"],["Derrotas","D"],["Rating","rating"]];
  const header=`<tr><th style="color:var(--muted)">Estatística</th>${seasons.map(s=>`<th style="color:var(--gold)">${s.year}<br><span style="font-size:9px;color:var(--muted)">${s.club}</span></th>`).join("")}</tr>`;
  const rows=fields.map(([l,k])=>{
    const vals=seasons.map(s=>{
      if(k==="GA")return n(s.G)+n(s.A);
      if(k==="avg")return n(s.J)>0?((n(s.G)+n(s.A))/n(s.J)).toFixed(2):0;
      return n(s[k]);
    });
    const mx=Math.max(...vals.map(Number));
    return`<tr><td style="color:var(--muted);font-size:11px">${l}</td>${vals.map((v,i)=>`<td class="tn" style="color:${Number(v)===mx&&mx>0?"var(--gold)":"var(--txt)"};font-size:16px">${v}${Number(v)===mx&&mx>0?" 👑":""}</td>`).join("")}</tr>`;
  }).join("");
  openModal(`<div style="font-family:var(--font-d);font-size:20px;color:var(--gold);margin-bottom:14px">⚖️ Comparação de Temporadas</div><div class="tbl-wrap"><table><thead>${header}</thead><tbody>${rows}</tbody></table></div>`);
}

/* ══ BALLON PHOTO UPLOAD ══ */
function triggerBallonPhoto(id){
  const inp=document.getElementById("bphoto-inp-"+id);
  if(inp) inp.click();
}
function handleBallonPhoto(input,id){
  const file=input.files&&input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){flash("Imagem muito grande (máx 5MB)","err");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=600;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",0.82);
      const b=S.ballons.find(x=>x.id===id);
      if(b){b.photo=compressed;scheduleSave();flash("✓ Foto adicionada!");renderBallon();}
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeBallonPhoto(id){
  const b=S.ballons.find(x=>x.id===id);
  if(b){b.photo="";scheduleSave();flash("Foto removida");renderBallon();}
}

/* ══ AVATAR UPLOAD ══ */
function triggerAvatarUpload(){
  const inp=document.getElementById("avatar-file-inp");
  if(inp) inp.click();
}
function handleAvatarUpload(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){flash("Imagem muito grande (máx 5MB)","err");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      // Compress to max 400×400 JPEG
      const MAX=400;
      let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}
      else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      const compressed=canvas.toDataURL("image/jpeg",0.82);
      S.profile.photo=compressed;
      scheduleSave();
      flash("✓ Foto atualizada!");
      renderOverview();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeAvatarPhoto(){
  S.profile.photo="";
  scheduleSave();
  flash("Foto removida");
  renderOverview();
  if(document.getElementById("ep-photo-preview")) renderPhotoPreview();
}
function renderPhotoPreview(){
  const el=document.getElementById("ep-photo-preview");
  if(!el)return;
  el.innerHTML=S.profile.photo
    ?`<div style="display:flex;align-items:center;gap:10px"><img src="${S.profile.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,67,.5)"><button class="btn btn-sm btn-danger" onclick="removeAvatarPhoto()">🗑 Remover foto</button></div>`
    :`<span style="font-size:11px;color:var(--muted)">Nenhuma foto — clique no avatar na aba Geral para fazer upload.</span>`;
}

/* ══ CAREER TIMELINE ══ */
function renderTimeline(){
  const pg=document.getElementById("page-timeline");

  // --- Build a unified year range ---
  // Collect all club years from S.clubs and S.seasons
  function parseYearRange(yStr){
    // formats: "2025–2027", "2025–atual", "2027/28", "2025"
    if(!yStr) return null;
    const m=yStr.match(/(\d{4})/g);
    if(!m||!m.length) return null;
    const start=parseInt(m[0]);
    const current=yStr.toLowerCase().includes("atual")||yStr.toLowerCase().includes("current");
    const end=current?2037:(m[1]?parseInt(m[1]):start+1);
    return{start,end};
  }

  // Map club id → color & accent from S.clubs
  const clubMap={};
  S.clubs.forEach(c=>{ clubMap[c.id]=c; clubMap[c.name]=c; });

  // Build timeline segments from S.clubs
  const segments=S.clubs.map(c=>{
    const r=parseYearRange(c.years);
    return r?{...c,startY:r.start,endY:r.end}:null;
  }).filter(Boolean).sort((a,b)=>a.startY-b.startY);

  const minY=segments.length?segments[0].startY:2025;
  const maxY=segments.length?Math.max(...segments.map(s=>s.endY)):2037;
  const span=maxY-minY||1;
  const W=1200; // inner canvas width
  const toX=y=>((y-minY)/span)*W;

  // --- Trophy positions: distribute above/below alternating ---
  // Group trophies by start year of first win
  function tropYearFromStr(yStr){
    if(!yStr) return null;
    const m=yStr.match(/\d{4}/);
    return m?parseInt(m[0]):null;
  }
  // Build trophy pins: one pin per trophy entry (use first year)
  const trophyPins=S.trophies.map(t=>{
    const y=tropYearFromStr(t.years);
    return y?{...t,y}:null;
  }).filter(Boolean).sort((a,b)=>a.y-b.y);

  // Ballon pins from S.ballons
  const ballonPins=S.ballons.map(b=>{
    const m=b.year.match(/\d{4}/);
    return m?{...b,y:parseInt(m[0])}:null;
  }).filter(Boolean);

  // National pins — estimate year from name
  const natPins=S.national.map(n=>{
    const m=n.name.match(/\d{4}/);
    return m?{...n,y:parseInt(m[0])}:null;
  }).filter(Boolean);

  // Transfer pins from S.transfers
  const transferPins=S.transfers.map(t=>({...t,y:parseInt(t.year)||0})).filter(t=>t.y>0);

  // --- Year ticks ---
  const ticks=[];
  for(let y=minY;y<=maxY;y++) ticks.push(y);

  // --- Render club blocks ---
  const TRACK_TOP=180; // px from top of tl-wrap to track center
  const BLOCK_H=40;

  const clubBlocksHTML=segments.map(seg=>{
    const x1=toX(seg.startY);const x2=toX(seg.endY);
    const w=Math.max(x2-x1,30);
    const color=seg.color||"#1A3FBF";
    const accent=seg.accent||"#4070DD";
    const titleCount=seg.titleCount||0;
    return`<div class="tl-club-block" 
      style="left:${x1}px;width:${w}px;background:linear-gradient(135deg,${color}CC,${accent}88);border-color:${accent}55"
      onclick="tlOpenClub(${seg.id})" title="${seg.fullName} (${seg.years})">
      <span class="tl-club-icon">${seg.icon}</span>
      ${w>60?`<span class="tl-club-label">${seg.name}</span>`:""}
      ${w>100&&titleCount?`<span style="font-size:8px;color:rgba(255,255,255,.7);flex-shrink:0">×${titleCount}🏆</span>`:""}
    </div>`;
  }).join("");

  // --- Transfer dots ---
  const trColors={academy:"var(--az3)",buy:"var(--gold)",record:"#FF6060",loan:"var(--green)",free:"#A0C8FF"};
  const transferHTML=transferPins.map(t=>{
    const x=toX(t.y);
    const col=trColors[t.type]||"var(--muted)";
    return`<div class="tl-transfer" style="left:${x}px" onclick="tlOpenTransfer(${t.id})" title="${t.from} → ${t.to}">
      <div class="tl-tr-dot" style="border-color:${col};color:${col}">↗</div>
    </div>`;
  }).join("");

  // --- Trophy pins: alternate above/below ---
  // Spread them so they don't stack
  const ABOVE_OFFSET=-70;
  const BELOW_OFFSET=60;
  // Assign positions with a simple stagger
  const usedX=[];
  function staggerX(xBase,arr){
    let x=xBase;
    while(arr.some(u=>Math.abs(u-x)<50)) x+=8;
    arr.push(x);
    return x;
  }

  // Trophies alternate above / below
  const trophyHTML=trophyPins.map((t,i)=>{
    const above=i%2===0;
    const lineH=above?50:50;
    const xr=staggerX(toX(t.y),[]);
    const side=above?"above":"below";
    return`<div class="tl-trophy-pin ${side}" style="left:${xr}px;top:${above?ABOVE_OFFSET+26:-(BELOW_OFFSET)+26}px" onclick="tlOpenTrophy(${t.id})" title="${t.name}">
      ${above?`<span class="tl-trophy-icon">${t.icon}</span><span class="tl-trophy-label">${t.name.split(" ").slice(0,2).join(" ")}</span>`:""}
      <div class="tl-trophy-line" style="height:${lineH}px"></div>
      <div class="tl-trophy-dot"></div>
      ${!above?`<div class="tl-trophy-line" style="height:0px"></div><span class="tl-trophy-icon">${t.icon}</span><span class="tl-trophy-label">${t.name.split(" ").slice(0,2).join(" ")}</span>`:""}
    </div>`;
  }).join("");

  // Ballons: above the trophy row
  const ballonHTML=ballonPins.map((b,i)=>{
    const xr=toX(b.y);
    return`<div class="tl-ballon-pin" style="left:${xr}px;top:${-130}px" onclick="tlOpenBallon(${b.id})" title="Ballon d'Or ${b.year}">
      <span class="tl-ballon-star">🟡</span>
      <span class="tl-ballon-label">B.d'Or<br>${b.year}</span>
      <div class="tl-ballon-line" style="height:56px"></div>
      <div class="tl-ballon-dot"></div>
    </div>`;
  }).join("");

  // National: below track
  const natHTML=natPins.map(n=>{
    const xr=toX(n.y);
    const col=n.tier==="gold"?"#FFD700":n.tier==="silver"?"#C0C8D8":"#CD7F32";
    return`<div class="tl-nat-pin" style="left:${xr}px;top:26px" onclick="tlOpenNat(${n.id})" title="${n.name}">
      <div class="tl-nat-dot" style="background:${col}"></div>
      <div class="tl-nat-line" style="height:45px;background:${col}44"></div>
      <span class="tl-nat-icon">${n.icon}</span>
      <span class="tl-nat-label" style="color:${col}">${n.name}</span>
    </div>`;
  }).join("");

  // Year ticks
  const ticksHTML=ticks.map(y=>`<div class="tl-year-tick" style="left:${toX(y)}px">
    <span>${y}</span>
  </div>`).join("");

  const TOTAL_W=W+80;
  const TOTAL_H=380;

  pg.innerHTML=`
    <div class="panel" style="padding:18px">
      <div class="slabel">🎬 Linha do Tempo da Carreira — Interativa</div>
      <div class="tl-legend">
        ${S.clubs.map(c=>`<div class="tl-leg-item"><div class="tl-leg-swatch" style="background:${c.color||"#1A3FBF"}"></div>${c.name}</div>`).join("")}
        <div class="tl-leg-item"><span style="font-size:12px">🟡</span> Ballon d'Or</div>
        <div class="tl-leg-item"><span style="font-size:12px">↗</span> Transferência</div>
        <div class="tl-leg-item"><span style="color:var(--gold);font-size:10px">🏆</span> Troféu</div>
        <div class="tl-leg-item"><span style="color:#4EC88A;font-size:10px">🌍</span> Seleção</div>
      </div>
    </div>
    <div class="panel" style="padding:16px 0;overflow:visible">
      <div class="tl-outer">
        <div class="tl-wrap" style="height:${TOTAL_H}px;width:${TOTAL_W}px">
          <!-- Track -->
          <div class="tl-track"></div>
          <!-- Year ticks -->
          <div style="position:absolute;left:40px;right:40px;top:50%;height:0">
            ${ticksHTML}
          </div>
          <!-- Club blocks -->
          <div class="tl-clubs-row">
            ${clubBlocksHTML}
          </div>
          <!-- Transfer dots -->
          <div class="tl-clubs-row" style="z-index:3">
            ${transferHTML}
          </div>
          <!-- Trophy pins (above) -->
          <div style="position:absolute;left:40px;right:40px;top:50%;height:0">
            ${trophyHTML}
          </div>
          <!-- Ballon pins -->
          <div style="position:absolute;left:40px;right:40px;top:50%;height:0">
            ${ballonHTML}
          </div>
          <!-- National pins (below) -->
          <div style="position:absolute;left:40px;right:40px;top:50%;height:0">
            ${natHTML}
          </div>
        </div>
      </div>
    </div>
    <p style="font-size:10px;color:var(--muted);text-align:center;margin-top:-6px">← Arraste para navegar · Clique em qualquer elemento para ver detalhes →</p>
  `;
}

/* TL Modal openers */

function tlOpenTrophy(id){
  const t=S.trophies.find(x=>x.id===id);if(!t)return;
  openModal(`${ita()}<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><span style="font-size:38px">${t.icon}</span><div><div style="font-family:var(--font-d);font-size:20px;color:var(--gold)">${t.name}</div><div style="font-size:10px;color:var(--muted);margin-top:3px">${t.category==="europe"?"🌍 Europeu":"🏠 Doméstico"}</div></div></div><div class="az-div"></div><div style="font-family:var(--font-d);font-size:36px;color:var(--gold);margin-bottom:6px">×${t.count}</div><div style="font-size:11px;color:var(--muted);margin-bottom:8px">Anos: ${t.years}</div>${t.desc?`<div style="font-size:11px;color:var(--muted);line-height:1.7;border-left:3px solid rgba(201,168,67,.4);padding-left:10px">${t.desc}</div>`:""}`);

function tlOpenBallon(id){
  const b=S.ballons.find(x=>x.id===id);if(!b)return;
  const idx=S.ballons.indexOf(b)+1;
  openModal(`${ita()}<div style="text-align:center;padding:16px 0"><div style="font-size:56px;filter:drop-shadow(0 0 20px rgba(201,168,67,.9))">🟡</div><div style="font-family:var(--font-d);font-size:28px;color:var(--gold);letter-spacing:3px;margin-top:8px">Ballon d'Or</div><div style="font-size:14px;color:var(--muted);margin-top:6px">${b.year}</div><div style="font-size:11px;color:var(--txt);margin-top:4px">${b.club}</div><div style="margin-top:16px;background:rgba(201,168,67,.1);border:1px solid rgba(201,168,67,.2);border-radius:8px;padding:12px;font-family:var(--font-d);font-size:18px;color:var(--gold)">${idx}ª conquista de ${S.ballons.length}</div></div>`);

function tlOpenNat(id){
  const n=S.national.find(x=>x.id===id);if(!n)return;

/* ══ GLOBAL SEARCH ══ */
function openSearch(){
  document.getElementById("gsearch-wrap").classList.add("open");
  setTimeout(()=>document.getElementById("gsearch-inp").focus(),50);
}
function closeSearch(){
  document.getElementById("gsearch-wrap").classList.remove("open");
  document.getElementById("gsearch-inp").value="";
  document.getElementById("gsearch-results").innerHTML=`<div class="gs-empty">Digite para buscar...</div>`;
}
function searchKey(e){
  if(e.key==="Escape") closeSearch();
  if(e.key==="Enter"){
    const first=document.querySelector(".gs-item");
    if(first) first.click();
  }
}
function runSearch(q){
  const res=document.getElementById("gsearch-results");
  const v=q.trim().toLowerCase();
  if(!v){res.innerHTML=`<div class="gs-empty">Digite para buscar...</div>`;return;}
  let html="";
  // Seasons
  const ss=S.seasons.filter(s=>`${s.year} ${s.club} ${s.liga}`.toLowerCase().includes(v));
  if(ss.length){
    html+=`<div class="gs-section">Temporadas</div>`;
    html+=ss.slice(0,5).map(s=>`<div class="gs-item" onclick="closeSearch();navigate('seasons');setTimeout(()=>openSeasonModal(${s.id}),200)"><div class="gs-icon">📅</div><div><div class="gs-label">${s.year} · ${s.club} ${s.country}</div><div class="gs-sub">${s.liga}</div></div><div class="gs-badge">${n(s.G)+n(s.A)} G/A</div></div>`).join("");
  }
  // Trophies
  const ts=S.trophies.filter(t=>t.name.toLowerCase().includes(v));
  if(ts.length){
    html+=`<div class="gs-section">Troféus</div>`;
    html+=ts.slice(0,4).map(t=>`<div class="gs-item" onclick="closeSearch();navigate('trophies');setTimeout(()=>openTModal(${t.id}),200)"><div class="gs-icon">${t.icon}</div><div><div class="gs-label">${t.name}</div><div class="gs-sub">${t.category==="europe"?"Europa":"Doméstico"}</div></div><div class="gs-badge">×${t.count}</div></div>`).join("");
  }
  // Clubs
  const cs=S.clubs.filter(c=>`${c.fullName} ${c.name} ${c.country}`.toLowerCase().includes(v));
  if(cs.length){
    html+=`<div class="gs-section">Clubes</div>`;
    html+=cs.slice(0,3).map(c=>`<div class="gs-item" onclick="closeSearch();navigate('clubs');setTimeout(()=>{S.expandedClub=${c.id};renderClubs();document.getElementById('club-${c.id}')?.scrollIntoView({behavior:'smooth',block:'center'})},200)"><div class="gs-icon">${c.icon}</div><div><div class="gs-label">${c.fullName}</div><div class="gs-sub">${c.country} · ${c.league}</div></div><div class="gs-badge">${c.years}</div></div>`).join("");
  }
  if(!html) html=`<div class="gs-empty">Nenhum resultado para "${esc(q)}"</div>`;
  res.innerHTML=html;
}

/* ══ KEYBOARD SHORTCUTS ══ */
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.isContentEditable) return;
  const map={g:"overview",c:"clubs",e:"ballon",t:"seasons",r:"trophies",s:"national",d:"edit"};
  if(e.key==="/"||e.key==="\\"){ e.preventDefault(); openSearch(); return; }
  if(e.key==="Escape"){ closeSearch(); closeModal(); return; }
  if(map[e.key.toLowerCase()]){ navigate(map[e.key.toLowerCase()]); }
});

/* ══ ROUTER ══ */
function renderPage(p){
  if(p==="overview") renderOverview();
  else if(p==="clubs") renderClubs();
  else if(p==="ballon") renderBallon();

  else if(p==="seasons") renderSeasons();
  else if(p==="trophies") renderTrophies();
  else if(p==="national") renderNational();
  else if(p==="edit") renderEdit();
}

/* ══ INIT ══ */
// Módulo ES: expõe funções usadas em onclick="" para o escopo global
function exposeGlobals(){
  const fns={
    navigate,closeModal,togF,checkPwd,togglePwdVis,
    openSearch,closeSearch,searchKey,runSearch,
    toggleCompare,clearCompare,openCompare,
    sortSeasons,toggleTheme,
    // timeline
    tlOpenClub,tlOpenTransfer,tlOpenTrophy,tlOpenBallon,tlOpenNat,
    // edit tabs
    setES,resetAll,saveProfile,exportData,importDataFromInput,
    triggerAvatarUpload,handleAvatarUpload,removeAvatarPhoto,renderPhotoPreview,
    triggerBallonPhoto,handleBallonPhoto,removeBallonPhoto,
    // seasons
    newSM,addS,editSM,saveS,delS,filterSeasons,openSeasonModal,addSeasonWin,removeSeasonWin,createAndAddSeasonWin,
    // trophies
    newTM,addT,editTM,saveT,delT,openTModal,setTF,
    // national
    newNM,addN,editNM,saveN,delN,
    // ballons
    newBM,addB,editBM,saveB,delB,
    // transfers
    newTrM,addTr,editTrM,saveTr,delTr,
    // clubs
    togClub,confirmDelClub,delClub,newClubModal,addNewClub,editClubModal,saveClub,
  };
  Object.entries(fns).forEach(([k,v])=>window[k]=v);
}

async function bootApp(){
  setSyncStatus("saving","Carregando...");
  await loadFromCloud();
  exposeGlobals();
  document.getElementById("nav-brand").textContent=S.profile.name.toUpperCase()+(S.profile.retired?" · APOSENTADO":"");
  renderOverview();
  document.getElementById("loading").style.display="none";
  setSyncStatus("synced","Sincronizado ✓");
  const ub=document.getElementById("user-badge");
  if(ub)ub.style.display="none";
}

if(sessionStorage.getItem("cf-auth")==="ok"){bootApp();}
else{exposeGlobals();renderLoginScreen();}
</script>
